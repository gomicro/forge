name: Build
on: [push]

env:
  GO_VERSION: "1.26"

jobs:

  linting:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Test
      run: go test ./...

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [linting, test]

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Login to Docker Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Snapshot
      uses: goreleaser/goreleaser-action@v7
      with:
        args: release --snapshot

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: goreleaser/goreleaser-action@v7
      with:
        args: release --clean
